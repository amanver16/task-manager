<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
		<nav class="navigation-menu">
			<a href="index.html" class="nav-link-color">Home</a>
			<a href="projects.html" class="nav-link-color" target="_blank">Projects</a>
			<a href="users.html" class="nav-link-color">Users</a>
		</nav>
	</header>
	<main class="main-content-create-task">
		<div class="create-task-header-container">
			<h1 class="create-task-header">Create Task</h1>
		</div>
		<div class="create-task-form-container">
			<form class="create-task-form">
				<label for="task-name">Task Name:</label>
				<input type="text" id="task-name" name="task-name" required>

				<label for="task-description">Task Description:</label>
				<textarea id="task-description" name="task-description" rows="4" required></textarea>

				<label for="task-assignee">Assignee:</label>
				<select id="task-assignee" name="task-assignee" required>
					<option value="">Select Assignee</option>
					<option value="john-doe">John Doe</option>
					<option value="jane-smith">Jane Smith</option>
					<option value="mike-johnson">Mike Johnson</option>
				</select>

				<label for="task-due-date">Due Date:</label>
				<input type="date" id="task-due-date" name="task-due-date" required>

				<button type="submit" class="submit-button">Create Task</button>
			</form>
		</div>
	</main>

	<footer class="footer">
		<p>Copyright &copy; 2024 Task Manager</p>
	</footer>
</body>
</html>
