<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
		<nav class="navigation-menu">
			<a href="index.html" class="nav-link-color">Home</a>
			<a href="projects.html" class="nav-link-color" target="_blank">Projects</a>
			<a href="users.html" class="nav-link-color">Users</a>
		</nav>
	</header>
	<main class="main-content">
		<div class="task-list-header">
			<h1>Task List</h1>
		</div>
		<div class="task-list">
			<div class="row header-row">
				<p class="task-id">ID</p>
				<p class="task-name">Task Name</p>
				<p class="task-status">Status</p>
				<p class="task-due-date">Due Date</p>
				<p class="task-assignee">Assignee</p>
			</div>
			<div class="row task-row">
				<p class="task-id">1</p>
				<p class="task-name">Fix bug on Home screen</p>
				<p class="task-status">In Progress</p>
				<p class="task-due-date">2024-06-15</p>
				<p class="task-assignee">John Doe</p>
			</div>
			<div class="row task-row">
				<p class="task-id">2</p>
				<p class="task-name">Fix bug on Project screen</p>
				<p class="task-status">Not Started</p>
				<p class="task-due-date">2024-06-20</p>
				<p class="task-assignee">Jane Smith</p>
			</div>
			<div class="row task-row">
				<p class="task-id">3</p>
				<p class="task-name">Fix bug on Users screen</p>
				<p class="task-status">Completed</p>
				<p class="task-due-date">2024-06-10</p>
				<p class="task-assignee">Mike Johnson</p>
			</div>
		</div>
	</main>

	<footer class="footer">
		<p>Copyright &copy; 2024 Task Manager</p>
	</footer>
</body>
</html>
